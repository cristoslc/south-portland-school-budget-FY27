# Inter-Meeting Evidence Manifest — JSON Schema (YAML encoding)
#
# Validates the inter-meeting manifest:
#   data/interpretation/inter-meeting/manifest.yaml
#
# Inter-meeting evidence captures sources that are not affiliated with
# any single meeting (e.g., news articles, public statements, documents
# posted between meetings).
#
# Spec: SPEC-016 (Meeting Bundle Schema)
# Part of: VISION-003 (Interpretation Pipeline)

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "inter-meeting-manifest-schema"
title: "Inter-Meeting Evidence Manifest"
description: >
  Schema for evidence sources that fall between meetings and are not
  directly affiliated with a single meeting. The date_range fields
  indicate which meetings the evidence falls between, enabling the
  brief generator to include relevant inter-meeting context.

type: object

required:
  - schema_version
  - entries

properties:

  schema_version:
    type: string
    const: "1.0"
    description: >
      Schema version string.

  entries:
    type: array
    items:
      $ref: "#/$defs/entry"
    description: >
      List of inter-meeting evidence entries.

additionalProperties: false

$defs:
  entry:
    type: object
    required:
      - entry_id
      - date_posted
      - source_type
      - source_path
      - description
      - date_range
    properties:

      entry_id:
        type: string
        description: >
          Unique identifier for this inter-meeting entry.

      date_posted:
        type: string
        format: date
        pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        description: >
          Date the evidence was posted or became available.

      source_type:
        type: string
        enum:
          - news-article
          - public-statement
          - document
          - letter
          - announcement
          - other
        description: >
          Kind of inter-meeting evidence.

      source_path:
        type: string
        description: >
          Relative path (from project root) to the source file.

      title:
        type: string
        description: >
          Human-readable title for the evidence.

      description:
        type: string
        description: >
          Brief description of what this evidence contains and why
          it is relevant to the budget analysis.

      date_range:
        type: object
        required:
          - posted_after
          - posted_before
        properties:
          posted_after:
            type: string
            format: date
            pattern: "^\\d{4}-\\d{2}-\\d{2}$"
            description: >
              Date of the most recent meeting before this evidence
              was posted.
          posted_before:
            type: string
            format: date
            pattern: "^\\d{4}-\\d{2}-\\d{2}$"
            description: >
              Date of the next meeting after this evidence was posted.
        additionalProperties: false
        description: >
          The meeting dates this evidence falls between. posted_after
          must be before posted_before.

      body:
        type: string
        enum:
          - school-board
          - city-council
          - both
        description: >
          Which governing body this evidence is relevant to. "both"
          for cross-body evidence.

      normalized_path:
        type: string
        description: >
          Relative path (from project root) to normalized markdown
          if available.

    additionalProperties: false
