# Vimeo source configuration for the SPC-TV VTT connector
# Each entry maps a Vimeo video ID to its meeting metadata and output path.
#
# To add a new meeting: append an entry with the Vimeo ID, meeting type,
# date, and the relative path under data/ where the VTT should be saved.

channel: spctv  # SPC-TV Vimeo channel

sources:
