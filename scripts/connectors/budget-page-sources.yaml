# Budget page document sources for the budget_page.py connector
# Each entry maps a Google Drive/Docs URL to its local output path.
#
# To add a new document: append an entry with the URL, document type,
# and the relative path under data/ where the file should be saved.
#
# URL types supported:
#   - drive.google.com/file/d/{ID}/view  → downloaded directly
#   - docs.google.com/presentation/d/{ID}/edit → exported as PDF
#   - docs.google.com/spreadsheets/d/{ID}/edit → exported as XLSX

page_url: "https://www.spsdme.org/page/budget27"

